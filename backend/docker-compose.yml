version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webathon-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      # FIX 1: Named volume for chroma_db overrides the bind-mount permissions
      - chroma_data:/app/chroma_db
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://webathon-mongodb:27017
      - DB_NAME=soulsync
      - CHROMA_PERSIST_PATH=/app/chroma_db
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongodb
    networks:
      - webathon-network

  mongodb:
    image: mongo:7.0
    container_name: webathon-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - webathon-network

networks:
  webathon-network:
    driver: bridge

volumes:
  mongo_data:
  # FIX 1: Define the named volume
  chroma_data: